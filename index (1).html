<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Tia's Cookbook</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Outfit:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;font-weight:300;background:#f5f0e8;color:#2a2218;min-height:100vh;max-width:680px;margin:0 auto}
.nav{display:flex;border-bottom:0.5px solid #e0d8cc;background:#fff;position:sticky;top:0;z-index:10}
.nav-brand{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:600;padding:12px 16px;color:#2a2218;flex-shrink:0}
.nav-brand span{color:#8b5e3c}
.nav-tabs{display:flex;flex:1;overflow-x:auto;scrollbar-width:none}
.nav-tab{flex:1;min-width:60px;padding:12px 8px;border:none;background:transparent;font-family:'Outfit',sans-serif;font-size:11px;font-weight:400;color:#7a6f63;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.15s;display:flex;flex-direction:column;align-items:center;gap:3px}
.nav-tab i{font-size:18px}
.nav-tab.active{color:#8b5e3c;border-bottom-color:#8b5e3c;font-weight:500}
.nav-tab:hover:not(.active){color:#2a2218;background:#f5f0e8}
.screen{display:none;padding:16px}
.screen.active{display:block}
.week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.week-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600}
.btn{padding:8px 14px;border-radius:8px;border:0.5px solid #d4ccc0;background:#fff;font-family:'Outfit',sans-serif;font-size:12px;font-weight:400;color:#2a2218;cursor:pointer;display:inline-flex;align-items:center;gap:6px;transition:all 0.15s}
.btn:hover{background:#f5f0e8}
.btn:active{transform:scale(0.98)}
.btn i{font-size:14px}
.btn-accent{background:#8b5e3c;color:#fff;border-color:#8b5e3c}
.btn-accent:hover{background:#7a5234}
.btn-google{background:#fff;color:#2a2218;border:0.5px solid #d4ccc0;gap:8px}
.btn-sm{padding:6px 10px;font-size:11px}
.sync-bar{background:#fff;border:0.5px solid #e0d8cc;border-radius:12px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.sync-status{font-size:12px;color:#9a8f82;display:flex;align-items:center;gap:6px}
.sync-status.connected{color:#2d6a4f}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#d4ccc0;flex-shrink:0}
.sync-dot.connected{background:#2d6a4f}
.sync-actions{display:flex;gap:6px}
.day-card{background:#fff;border:0.5px solid #e0d8cc;border-radius:12px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.day-label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:#9a8f82;width:32px;flex-shrink:0}
.day-thumb{width:40px;height:40px;border-radius:8px;background:#f0ece4;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px;overflow:hidden;border:0.5px solid #e0d8cc}
.day-thumb img{width:100%;height:100%;object-fit:cover}
.day-meal{flex:1;min-width:0}
.day-meal-name{font-size:14px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-meal-meta{font-size:11px;color:#9a8f82;margin-top:2px}
.day-meal-empty{font-size:13px;color:#b0a89e;font-style:italic}
.day-actions{display:flex;gap:6px;flex-shrink:0;align-items:center}
.icon-btn{width:30px;height:30px;border-radius:8px;border:0.5px solid #e0d8cc;background:#f5f0e8;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s;color:#9a8f82}
.icon-btn:hover{border-color:#b0a89e;color:#2a2218}
.icon-btn i{font-size:14px}
.srv-control{display:flex;align-items:center;gap:4px;background:#f5f0e8;border:0.5px solid #e0d8cc;border-radius:8px;padding:3px 6px}
.srv-btn{background:none;border:none;cursor:pointer;color:#9a8f82;font-size:16px;width:18px;height:18px;display:flex;align-items:center;justify-content:center;border-radius:4px;transition:all 0.1s;line-height:1}
.srv-btn:hover{background:#e0d8cc;color:#2a2218}
.srv-val{font-size:12px;min-width:20px;text-align:center;color:#2a2218}
.srv-label{font-size:10px;color:#9a8f82;text-align:center}
.library-controls{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.library-controls select,.library-controls input{padding:7px 10px;border:0.5px solid #d4ccc0;border-radius:8px;font-family:'Outfit',sans-serif;font-size:12px;background:#fff;color:#2a2218}
.library-controls input{flex:1;min-width:120px}
.library-controls select:focus,.library-controls input:focus{outline:none;border-color:#8b5e3c}
.recipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px}
.recipe-card{background:#fff;border:0.5px solid #e0d8cc;border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color 0.15s}
.recipe-card:hover{border-color:#8b5e3c}
.recipe-thumb{height:100px;background:#f0ece4;display:flex;align-items:center;justify-content:center;font-size:32px;color:#b0a89e;overflow:hidden;position:relative}
.recipe-thumb img{width:100%;height:100%;object-fit:cover}
.recipe-thumb-overlay{position:absolute;top:6px;right:6px;background:rgba(0,0,0,0.5);color:#fff;font-size:10px;padding:2px 6px;border-radius:20px;display:flex;align-items:center;gap:3px}
.add-photo-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.35);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.15s;cursor:pointer;font-size:11px;color:#fff;gap:4px;flex-direction:column}
.add-photo-overlay i{font-size:20px}
.recipe-card:hover .add-photo-overlay{opacity:1}
.recipe-card-body{padding:10px}
.recipe-card-name{font-size:13px;font-weight:400;line-height:1.3;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.recipe-card-meta{font-size:11px;color:#9a8f82}
.cat-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;margin-bottom:4px;font-weight:400}
.cat-dinner{background:#d4edda;color:#155724}
.cat-breakfast{background:#fef3cd;color:#856404}
.cat-lunch{background:#d1ecf1;color:#0c5460}
.cat-dessert{background:#f8d7da;color:#721c24}
.cat-snack{background:#e2d9f3;color:#432874}
.cat-other{background:#f0ece4;color:#6b5f53}
.grocery-pill{padding:6px 12px;border-radius:20px;border:0.5px solid #d4ccc0;background:#fff;font-size:12px;display:inline-flex;align-items:center;gap:5px;margin:0 6px 6px 0}
.grocery-pill.on{background:#8b5e3c;color:#fff;border-color:#8b5e3c}
.grocery-item{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:0.5px solid #e8e0d4;font-size:14px}
.grocery-item:last-child{border-bottom:none}
.grocery-item input[type=checkbox]{accent-color:#8b5e3c;width:16px;height:16px;cursor:pointer;flex-shrink:0}
.grocery-item label{flex:1;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
.grocery-item label.done{text-decoration:line-through;color:#b0a89e}
.grocery-qty{font-size:12px;color:#9a8f82;white-space:nowrap}
.modal-wrap{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:50;align-items:flex-end;justify-content:center}
.modal-wrap.open{display:flex}
.modal{background:#fff;border-radius:16px 16px 0 0;width:100%;max-width:680px;max-height:85vh;overflow-y:auto;padding:20px 16px 40px}
.modal-handle{width:36px;height:4px;background:#d4ccc0;border-radius:2px;margin:0 auto 16px}
.modal-hero{width:100%;height:180px;background:#f0ece4;border-radius:12px;overflow:hidden;margin-bottom:16px;display:flex;align-items:center;justify-content:center;position:relative;cursor:pointer}
.modal-hero img{width:100%;height:100%;object-fit:cover}
.modal-hero-icon{font-size:48px;color:#d4ccc0}
.modal-hero-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.2s;flex-direction:column;gap:6px;color:#fff;font-size:13px}
.modal-hero-overlay i{font-size:24px}
.modal-hero:hover .modal-hero-overlay{opacity:1}
.modal-hero input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.modal-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;margin-bottom:6px}
.modal-meta{font-size:12px;color:#9a8f82;display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.modal-meta span{display:flex;align-items:center;gap:4px}
.scale-bar{display:flex;gap:6px;margin-bottom:16px;align-items:center}
.scale-btn{padding:5px 12px;border-radius:20px;border:0.5px solid #d4ccc0;background:#f5f0e8;font-size:12px;cursor:pointer;font-family:'Outfit',sans-serif;transition:all 0.15s}
.scale-btn.active{background:#8b5e3c;color:#fff;border-color:#8b5e3c}
.modal-section{margin-bottom:16px}
.modal-section-label{font-size:10px;font-weight:500;text-transform:uppercase;letter-spacing:0.08em;color:#9a8f82;margin-bottom:8px;padding-bottom:6px;border-bottom:0.5px solid #e8e0d4}
.ing-list{list-style:none}
.ing-item{display:flex;justify-content:space-between;padding:7px 0;font-size:14px;border-bottom:0.5px solid #f0ece4}
.ing-item:last-child{border-bottom:none}
.ing-qty{font-size:13px;color:#9a8f82}
.step-list{list-style:none}
.step-item{display:flex;gap:12px;padding:8px 0;font-size:14px;line-height:1.6;border-bottom:0.5px solid #f0ece4}
.step-item:last-child{border-bottom:none}
.step-num{width:22px;height:22px;border-radius:50%;background:#f0ece4;border:0.5px solid #e0d8cc;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;color:#9a8f82}
.macro-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}
.macro-box{background:#f5f0e8;border-radius:8px;padding:10px;text-align:center}
.macro-val{font-size:18px;font-weight:500}
.macro-label{font-size:10px;color:#9a8f82;margin-top:2px}
.notes-area{width:100%;padding:10px 12px;border:0.5px solid #d4ccc0;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;font-weight:300;line-height:1.6;resize:vertical;min-height:80px;background:#fff;color:#2a2218;transition:border-color 0.15s}
.notes-area:focus{outline:none;border-color:#8b5e3c}
.notes-saved{font-size:11px;color:#2d6a4f;margin-top:4px;height:14px;transition:opacity 0.3s}
.empty{text-align:center;padding:3rem 1rem;color:#b0a89e}
.empty i{font-size:36px;display:block;margin-bottom:10px;color:#d4ccc0}
.empty p{font-size:13px;margin-top:6px}
.picker-list{max-height:300px;overflow-y:auto}
.picker-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;cursor:pointer;transition:background 0.1s;font-size:13px}
.picker-item:hover{background:#f5f0e8}
.picker-thumb{width:36px;height:36px;border-radius:6px;background:#f0ece4;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;overflow:hidden}
.picker-thumb img{width:100%;height:100%;object-fit:cover}
.picker-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:13px}
.picker-meta{font-size:11px;color:#9a8f82}
.search-box{width:100%;padding:9px 12px;border:0.5px solid #d4ccc0;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;background:#fff;color:#2a2218;margin-bottom:10px}
.search-box:focus{outline:none;border-color:#8b5e3c}
.field{margin-bottom:10px}
.field label{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:0.06em;color:#9a8f82;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;padding:9px 12px;border:0.5px solid #d4ccc0;border-radius:8px;font-family:'Outfit',sans-serif;font-size:13px;background:#fff;color:#2a2218}
.field textarea{resize:vertical;min-height:80px;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#8b5e3c}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tab-bar{display:flex;gap:2px;background:#f0ece4;border-radius:8px;padding:3px;margin-bottom:16px}
.tab-btn{flex:1;padding:7px;border:none;background:transparent;font-family:'Outfit',sans-serif;font-size:12px;cursor:pointer;border-radius:6px;color:#9a8f82;transition:all 0.15s}
.tab-btn.active{background:#fff;color:#2a2218;font-weight:500}
.drop-zone{border:2px dashed #d4ccc0;border-radius:12px;padding:1.5rem;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:12px;position:relative}
.drop-zone.over{border-color:#8b5e3c;background:#fdf7f2}
.drop-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-zone i{font-size:28px;color:#b0a89e;display:block;margin-bottom:6px}
.drop-zone-title{font-size:14px;margin-bottom:3px}
.drop-zone-sub{font-size:11px;color:#9a8f82}
.file-types{display:flex;gap:6px;justify-content:center;margin-top:8px;flex-wrap:wrap}
.file-type{font-size:10px;padding:2px 8px;border-radius:20px;background:#f0ece4;color:#6b5f53;border:0.5px solid #e0d8cc}
.queue-item{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:0.5px solid #e0d8cc;border-radius:8px;margin-bottom:6px;font-size:12px}
.queue-item.done{border-color:#b7dfc8;background:#edf7f0}
.queue-item.error{border-color:#f0b8b8;background:#fdf0f0}
.queue-item.processing{border-color:#f0cdb0;background:#fdf7f2}
.queue-thumb{width:36px;height:36px;border-radius:6px;background:#f0ece4;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden}
.queue-thumb img{width:100%;height:100%;object-fit:cover}
.queue-info{flex:1;min-width:0}
.queue-name{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.queue-status{font-size:11px;color:#9a8f82;margin-top:1px}
.queue-status.done{color:#2d6a4f}
.queue-status.error{color:#c0392b}
.progress-bar{height:3px;background:#f0ece4;border-radius:3px;margin-bottom:12px;overflow:hidden}
.progress-fill{height:100%;background:#8b5e3c;border-radius:3px;transition:width 0.3s;width:0%}
.spinner{width:14px;height:14px;border:2px solid #e0d8cc;border-top-color:#8b5e3c;border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.log-box{background:#f5f0e8;border-radius:8px;padding:10px 12px;font-size:11px;font-family:monospace;max-height:80px;overflow-y:auto;margin-top:10px;display:none}
.log-box.visible{display:block}
.log-line{padding:1px 0;color:#9a8f82}
.log-line.ok{color:#2d6a4f}
.log-line.err{color:#c0392b}
@media(max-width:400px){.recipe-grid{grid-template-columns:repeat(2,1fr)}.macro-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="nav">
  <div class="nav-brand">Tia's <span>Cookbook</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="show('planner')" id="tab-planner"><i class="ti ti-calendar-week"></i>Plan</button>
    <button class="nav-tab" onclick="show('grocery')" id="tab-grocery"><i class="ti ti-shopping-cart"></i>Shop</button>
    <button class="nav-tab" onclick="show('library')" id="tab-library"><i class="ti ti-books"></i>Recipes</button>
    <button class="nav-tab" onclick="show('upload')" id="tab-upload"><i class="ti ti-upload"></i>Import</button>
  </div>
</div>

<!-- Planner -->
<div class="screen active" id="screen-planner">
  <div class="sync-bar">
    <div class="sync-status" id="sync-status"><div class="sync-dot" id="sync-dot"></div><span id="sync-label">Not connected to Google</span></div>
    <div class="sync-actions">
      <button class="btn btn-sm btn-google" onclick="connectGoogle()" id="connect-btn"><i class="ti ti-brand-google"></i> Connect Google</button>
      <button class="btn btn-sm btn-accent" onclick="syncAll()" id="sync-btn" style="display:none"><i class="ti ti-refresh"></i> Sync</button>
    </div>
  </div>
  <div class="week-header">
    <div class="week-title">This week</div>
    <button class="btn btn-accent" onclick="suggestWeek()"><i class="ti ti-sparkles"></i> Suggest meals</button>
  </div>
  <div id="day-list"></div>
</div>

<!-- Grocery -->
<div class="screen" id="screen-grocery">
  <div class="week-header">
    <div class="week-title">Grocery list</div>
    <button class="btn" onclick="printList()"><i class="ti ti-printer"></i> Print</button>
  </div>
  <div style="font-size:12px;color:#9a8f82;margin-bottom:12px">Based on your planned meals — quantities scaled to your chosen servings</div>
  <div id="grocery-pills"></div>
  <div id="grocery-list"></div>
</div>

<!-- Library -->
<div class="screen" id="screen-library">
  <div class="week-header">
    <div class="week-title">My recipes</div>
    <div id="recipe-count" style="font-size:12px;color:#9a8f82"></div>
  </div>
  <div class="library-controls">
    <input type="text" placeholder="Search..." oninput="filterLibrary()" id="lib-search">
    <select onchange="filterLibrary()" id="lib-cat">
      <option value="">All categories</option>
      <option>Breakfast</option><option>Lunch</option><option>Dinner</option>
      <option>Dessert</option><option>Snack</option><option>Appetizer</option><option>Side</option>
    </select>
    <select onchange="filterLibrary()" id="lib-sort">
      <option value="recent">Recently added</option>
      <option value="az">A → Z</option>
      <option value="cat">Category</option>
      <option value="time">Quickest first</option>
    </select>
  </div>
  <div class="recipe-grid" id="recipe-grid"></div>
</div>

<!-- Upload -->
<div class="screen" id="screen-upload">
  <div class="week-title" style="margin-bottom:12px">Import recipes</div>
  <div class="tab-bar">
    <button class="tab-btn active" onclick="importTab('ai')" id="itab-ai"><i class="ti ti-sparkles"></i> AI extraction</button>
    <button class="tab-btn" onclick="importTab('manual')" id="itab-manual"><i class="ti ti-pencil"></i> Add manually</button>
  </div>

  <div id="import-ai">
    <div class="field">
      <label>Anthropic API key</label>
      <input type="password" id="api-key" placeholder="sk-ant-...">
      <div style="font-size:11px;color:#9a8f82;margin-top:4px">Saved locally · <a href="https://console.anthropic.com" target="_blank" style="color:#8b5e3c">Get your key</a></div>
    </div>
    <div class="drop-zone" id="drop-zone" ondragover="dzOver(event)" ondragleave="dzLeave()" ondrop="dzDrop(event)">
      <input type="file" multiple accept=".pdf,.jpg,.jpeg,.png,.webp,.heic" onchange="filesChosen(event)">
      <i class="ti ti-cloud-upload"></i>
      <div class="drop-zone-title">Drop recipe files here</div>
      <div class="drop-zone-sub">or click to browse</div>
      <div class="file-types">
        <span class="file-type">PDF</span><span class="file-type">Photo</span>
        <span class="file-type">Screenshot</span><span class="file-type">Handwritten</span>
      </div>
    </div>
    <div id="queue-area" style="display:none">
      <div class="progress-bar"><div class="progress-fill" id="prog"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:12px;color:#9a8f82" id="q-count"></div>
        <div style="display:flex;gap:6px">
          <button class="btn btn-sm" onclick="clearDone()"><i class="ti ti-trash"></i> Clear</button>
          <button class="btn btn-accent btn-sm" onclick="extractAll()" id="extract-btn"><i class="ti ti-sparkles"></i> Extract all</button>
        </div>
      </div>
      <div id="queue-list"></div>
    </div>
    <div class="log-box" id="log-box"></div>
  </div>

  <div id="import-manual" style="display:none">
    <div class="field"><label>Recipe name</label><input type="text" id="m-name" placeholder="e.g. Chicken Stir Fry"></div>
    <div class="field-row">
      <div class="field"><label>Category</label>
        <select id="m-cat"><option>Dinner</option><option>Breakfast</option><option>Lunch</option><option>Dessert</option><option>Snack</option><option>Appetizer</option><option>Side</option></select>
      </div>
      <div class="field"><label>Servings</label><input type="number" id="m-servings" value="4" min="1"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Prep time (min)</label><input type="number" id="m-prep" value="10" min="0"></div>
      <div class="field"><label>Cook time (min)</label><input type="number" id="m-cook" value="20" min="0"></div>
    </div>
    <div class="field">
      <label>Photo (optional)</label>

<script>
// ── Config ──────────────────────────────────────────────────────────────
const CLIENT_ID = '1038631042563-gvhe2h5k1h6suq56rqspqv80ggi2k8mg.apps.googleusercontent.com';
const SHEET_ID  = '16yWPKCZrL14uBH5oBsCh3eG7ZCLfkml0TcpOW-m5_rs';
const SCOPES    = 'https://www.googleapis.com/auth/spreadsheets';
const REDIRECT  = 'https://stephentea3.github.io/tias-cookbook';

const DAYS     = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
const DAY_FULL = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// ── State ────────────────────────────────────────────────────────────────
let recipes  = JSON.parse(localStorage.getItem('tc_recipes') || '[]');
let plan     = JSON.parse(localStorage.getItem('tc_plan')    || 'null') || {meals:Array(7).fill(null),servings:Array(7).fill(null)};
if(!plan.servings) plan.servings = Array(7).fill(null);

let accessToken   = localStorage.getItem('tc_gtoken') || '';
let tokenExpiry   = parseInt(localStorage.getItem('tc_gexpiry') || '0');
let queue         = [], extracting = false, pickerDay = -1;
let apiKey        = localStorage.getItem('tc_apikey') || '';
let currentScale  = 1, currentRecipe = null, manualPhotoData = null, notesSaveTimer = null;

// ── Boot ─────────────────────────────────────────────────────────────────
if(apiKey) document.getElementById('api-key').value = apiKey;
document.getElementById('api-key').addEventListener('change', () => {
  apiKey = document.getElementById('api-key').value.trim();
  localStorage.setItem('tc_apikey', apiKey);
});

// Handle OAuth redirect — token comes back in URL hash
(function handleOAuthReturn(){
  const hash = new URLSearchParams(window.location.hash.slice(1));
  const token = hash.get('access_token');
  const expiresIn = hash.get('expires_in');
  if(token){
    accessToken = token;
    tokenExpiry = Date.now() + parseInt(expiresIn||3600)*1000;
    localStorage.setItem('tc_gtoken', accessToken);
    localStorage.setItem('tc_gexpiry', tokenExpiry.toString());
    window.history.replaceState({}, document.title, window.location.pathname);
    onConnected();
  } else if(accessToken && Date.now() < tokenExpiry){
    onConnected();
  }
})();

function isTokenValid(){ return accessToken && Date.now() < tokenExpiry; }

function connectGoogle(){
  const params = new URLSearchParams({
    client_id:     CLIENT_ID,
    redirect_uri:  REDIRECT,
    response_type: 'token',
    scope:         SCOPES,
    prompt:        'consent'
  });
  window.location.href = 'https://accounts.google.com/o/oauth2/v2/auth?' + params.toString();
}

function onConnected(){
  document.getElementById('sync-dot').classList.add('connected');
  document.getElementById('sync-status').classList.add('connected');
  document.getElementById('sync-label').textContent = 'Connected to Google Sheets';
  document.getElementById('connect-btn').style.display = 'none';
  document.getElementById('sync-btn').style.display = 'inline-flex';
  // Auto-load recipes from Sheets on connect
  loadFromSheets();
}

// ── Persist ───────────────────────────────────────────────────────────────
function save(){
  localStorage.setItem('tc_recipes', JSON.stringify(recipes));
  localStorage.setItem('tc_plan',    JSON.stringify(plan));
}

// ── Sheets helpers ────────────────────────────────────────────────────────
async function sheetsGet(range){
  const res = await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}`,
    { headers:{ Authorization:'Bearer '+accessToken } }
  );
  if(!res.ok) throw new Error('Sheets read failed: '+res.status);
  return (await res.json()).values || [];
}

async function sheetsPut(range, values){
  await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`,
    { method:'PUT', headers:{ Authorization:'Bearer '+accessToken, 'Content-Type':'application/json' },
      body: JSON.stringify({ range, majorDimension:'ROWS', values }) }
  );
}

async function sheetsAppend(range, values){
  await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,
    { method:'POST', headers:{ Authorization:'Bearer '+accessToken, 'Content-Type':'application/json' },
      body: JSON.stringify({ values }) }
  );
}

async function sheetsClear(range){
  await fetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/${encodeURIComponent(range)}:clear`,
    { method:'POST', headers:{ Authorization:'Bearer '+accessToken } }
  );
}

// ── Sync: load from Sheets ────────────────────────────────────────────────
async function loadFromSheets(){
  if(!isTokenValid()) return;
  try {
    log('Loading recipes from Google Sheets...');

    // Ensure headers exist
    const header = await sheetsGet('Recipes!A1:M1');
    if(!header.length){
      await sheetsPut('Recipes!A1', [['ID','Name','Category','Servings','Prep','Cook','Calories','Protein','Carbs','Fat','Tags','Ingredients','Steps','Notes']]);
    }

    const rows = await sheetsGet('Recipes!A2:N');
    if(!rows.length){ log('No recipes in Sheets yet.'); return; }

    const sheetsRecipes = rows.map(r => ({
      _id:          r[0] || (Date.now()+Math.random()),
      name:         r[1] || '',
      category:     r[2] || 'Dinner',
      servings:     parseFloat(r[3]) || 4,
      prep_time_min:parseFloat(r[4]) || 0,
      cook_time_min:parseFloat(r[5]) || 0,
      calories:     parseFloat(r[6]) || 0,
      protein_g:    parseFloat(r[7]) || 0,
      carbs_g:      parseFloat(r[8]) || 0,
      fat_g:        parseFloat(r[9]) || 0,
      tags:         (r[10]||'').split(',').map(t=>t.trim()).filter(Boolean),
      ingredients:  parseIngredients(r[11]||''),
      steps:        (r[12]||'').split(' | ').filter(Boolean),
      notes:        r[13] || '',
      _added:       Date.now(),
      // Preserve local thumbnail if we already have this recipe
      _thumb:       (recipes.find(x=>String(x._id)===String(r[0]))||{})._thumb || null
    }));

    // Merge: Sheets is source of truth for data, local is source of truth for images
    recipes = sheetsRecipes;
    save();
    renderLibrary();
    renderPlanner();
    log('✓ Loaded '+recipes.length+' recipes from Sheets', 'ok');
  } catch(e){
    log('Sheets load error: '+e.message, 'err');
  }
}

function parseIngredients(str){
  if(!str) return [];
  return str.split(' | ').filter(Boolean).map(s => {
    const parts = s.trim().split(' ');
    const qty   = parseFloat(parts[0]);
    const hasQty= !isNaN(qty);
    const units = ['cup','cups','tbsp','tsp','oz','lb','g','kg','ml','l','pinch','bunch','clove','cloves','can','slice','slices','piece','pieces'];
    let unit='', nameStart=hasQty?1:0;
    if(hasQty && parts[1] && units.includes(parts[1].toLowerCase())){ unit=parts[1]; nameStart=2; }
    return { name:parts.slice(nameStart).join(' ')||s, quantity:hasQty?qty:0, unit, notes:'' };
  });
}

// ── Sync: push all to Sheets ──────────────────────────────────────────────
async function syncAll(){
  if(!isTokenValid()){ alert('Please connect Google first.'); return; }
  const btn = document.getElementById('sync-btn');
  btn.innerHTML = '<div class="spinner" style="border-top-color:#fff"></div>';
  btn.disabled  = true;
  try {
    await sheetsClear('Recipes!A2:N');
    if(recipes.length){
      const rows = recipes.map(r => [
        String(r._id),
        r.name, r.category, r.servings,
        r.prep_time_min, r.cook_time_min,
        r.calories||0, r.protein_g||0, r.carbs_g||0, r.fat_g||0,
        (r.tags||[]).join(', '),
        (r.ingredients||[]).map(i=>`${i.quantity||''}${i.unit?' '+i.unit:''} ${i.name}`.trim()).join(' | '),
        (r.steps||[]).join(' | '),
        r.notes||''
      ]);
      await sheetsAppend('Recipes!A2', rows);
    }
    log('✓ Synced '+recipes.length+' recipes to Sheets', 'ok');
    document.getElementById('sync-label').textContent = 'Synced · '+new Date().toLocaleTimeString();
  } catch(e){
    log('Sync error: '+e.message, 'err');
  }
  btn.innerHTML = '<i class="ti ti-refresh"></i> Sync';
  btn.disabled  = false;
}

// ── Save a single recipe to Sheets ────────────────────────────────────────
async function pushRecipeToSheets(r){
  if(!isTokenValid()) return;
  try {
    const row = [[
      String(r._id), r.name, r.category, r.servings,
      r.prep_time_min, r.cook_time_min,
      r.calories||0, r.protein_g||0, r.carbs_g||0, r.fat_g||0,
      (r.tags||[]).join(', '),
      (r.ingredients||[]).map(i=>`${i.quantity||''}${i.unit?' '+i.unit:''} ${i.name}`.trim()).join(' | '),
      (r.steps||[]).join(' | '),
      r.notes||''
    ]];
    await sheetsAppend('Recipes!A2', row);
  } catch(e){
    log('Could not push to Sheets: '+e.message, 'err');
  }
}

// ── Update notes in Sheets ────────────────────────────────────────────────
async function updateNotesInSheets(r){
  if(!isTokenValid()) return;
  try {
    const rows = await sheetsGet('Recipes!A2:A');
    const rowIdx = rows.findIndex(row=>String(row[0])===String(r._id));
    if(rowIdx >= 0){
      await sheetsPut(`Recipes!N${rowIdx+2}`, [[r.notes||'']]);
    }
  } catch(e){ /* silent */ }
}

// ── Nav ───────────────────────────────────────────────────────────────────
function show(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('screen-'+n).classList.add('active');
  document.getElementById('tab-'+n).classList.add('active');
  if(n==='planner') renderPlanner();
  if(n==='grocery') renderGrocery();
  if(n==='library') renderLibrary();
}

function importTab(t){
  document.getElementById('import-ai').style.display     = t==='ai'     ? 'block':'none';
  document.getElementById('import-manual').style.display = t==='manual' ? 'block':'none';
  document.getElementById('itab-ai').classList.toggle('active',     t==='ai');
  document.getElementById('itab-manual').classList.toggle('active', t==='manual');
}

function catClass(cat){
  const c=(cat||'').toLowerCase();
  if(c==='breakfast') return 'cat-breakfast';
  if(c==='lunch')     return 'cat-lunch';
  if(c==='dinner')    return 'cat-dinner';
  if(c==='dessert')   return 'cat-dessert';
  if(c==='snack')     return 'cat-snack';
  return 'cat-other';
}

function getPlanServings(i){
  const meal = plan.meals[i] ? recipes.find(r=>String(r._id)===String(plan.meals[i])) : null;
  return plan.servings[i] || (meal ? meal.servings : 4);
}

// ── Planner ───────────────────────────────────────────────────────────────
function renderPlanner(){
  const el = document.getElementById('day-list');
  el.innerHTML = '';
  DAYS.forEach((d,i)=>{
    const meal = plan.meals[i] ? recipes.find(r=>String(r._id)===String(plan.meals[i])) : null;
    const srv  = getPlanServings(i);
    const div  = document.createElement('div');
    div.className = 'day-card';
    div.innerHTML = `
      <div class="day-label">${d}</div>
      ${meal ? `<div class="day-thumb">${meal._thumb?`<img src="${meal._thumb}" alt="">`:`<i class="ti ti-bowl-spoon"></i>`}</div>` : ''}
      <div class="day-meal"${meal?` onclick="openRecipe('${meal._id}')" style="cursor:pointer"`:''}>
        ${meal
          ? `<div class="day-meal-name">${meal.name}</div>
             <div class="day-meal-meta">${(meal.prep_time_min||0)+(meal.cook_time_min||0)?((meal.prep_time_min||0)+(meal.cook_time_min||0))+'m · ':''}${srv} servings</div>`
          : `<div class="day-meal-empty">No meal planned</div>`}
      </div>
      <div class="day-actions">
        ${meal ? `<div class="srv-control">
          <button class="srv-btn" onclick="changeSrv(${i},-1)">−</button>
          <div><div class="srv-val" id="srv-${i}">${srv}</div><div class="srv-label">srv</div></div>
          <button class="srv-btn" onclick="changeSrv(${i},1)">+</button>
        </div>` : ''}
        <button class="icon-btn" onclick="openPicker(${i})" title="Change meal"><i class="ti ti-pencil"></i></button>
        ${meal ? `<button class="icon-btn" onclick="clearDay(${i})" title="Clear"><i class="ti ti-x"></i></button>` : ''}
      </div>`;
    el.appendChild(div);
  });
}

function changeSrv(i, delta){
  const meal = plan.meals[i] ? recipes.find(r=>String(r._id)===String(plan.meals[i])) : null;
  if(!meal) return;
  plan.servings[i] = Math.max(1, (plan.servings[i]||meal.servings||4) + delta);
  save();
  const valEl = document.getElementById('srv-'+i);
  if(valEl) valEl.textContent = plan.servings[i];
  const card = valEl?.closest('.day-card');
  if(card){
    const meta = card.querySelector('.day-meal-meta');
    if(meta){
      const total = (meal.prep_time_min||0)+(meal.cook_time_min||0);
      meta.textContent = (total?total+'m · ':'')+plan.servings[i]+' servings';
    }
  }
}

function clearDay(i){ plan.meals[i]=null; plan.servings[i]=null; save(); renderPlanner(); }

function suggestWeek(){
  if(!recipes.length){ alert('No recipes yet — add some in the Import tab!'); return; }
  const quick    = recipes.filter(r=>(r.prep_time_min||99)+(r.cook_time_min||99)<=40);
  const pool     = quick.length>=5 ? quick : recipes;
  const shuffled = [...pool].sort(()=>Math.random()-0.5);
  plan.meals    = DAYS.map((_,i)=>shuffled[i%shuffled.length]?._id||null);
  plan.servings = Array(7).fill(null);
  save(); renderPlanner();
}

// ── Picker ────────────────────────────────────────────────────────────────
function openPicker(dayIdx){
  pickerDay = dayIdx;
  document.getElementById('picker-title').textContent = 'Meal for '+DAY_FULL[dayIdx];
  document.getElementById('picker-search').value = '';
  filterPicker();
  document.getElementById('picker-modal').classList.add('open');
}

function filterPicker(){
  const q  = document.getElementById('picker-search').value.toLowerCase();
  const el = document.getElementById('picker-list');
  const filtered = recipes.filter(r=>!q||r.name.toLowerCase().includes(q));
  if(!filtered.length){ el.innerHTML='<div style="text-align:center;padding:2rem;font-size:13px;color:#9a8f82">No recipes found</div>'; return; }
  el.innerHTML = filtered.map(r=>`
    <div class="picker-item" onclick="pickMeal('${r._id}')">
      <div class="picker-thumb">${r._thumb?`<img src="${r._thumb}" alt="">`:`<i class="ti ti-bowl-spoon"></i>`}</div>
      <div>
        <div class="picker-name">${r.name}</div>
        <div class="picker-meta">${(r.prep_time_min||0)+(r.cook_time_min||0)?((r.prep_time_min||0)+(r.cook_time_min||0))+'m · ':''}${r.category||''}</div>
      </div>
    </div>`).join('');
}

function pickMeal(id){ plan.meals[pickerDay]=id; plan.servings[pickerDay]=null; save(); closePicker(); renderPlanner(); }
function closePicker(e){ if(!e||e.target===document.getElementById('picker-modal')) document.getElementById('picker-modal').classList.remove('open'); }

// ── Grocery ───────────────────────────────────────────────────────────────
function renderGrocery(){
  const pills   = document.getElementById('grocery-pills');
  const list    = document.getElementById('grocery-list');
  const planned = plan.meals.map((id,i)=>({id,day:DAYS[i],srv:getPlanServings(i)})).filter(x=>x.id);
  if(!planned.length){ pills.innerHTML=''; list.innerHTML='<div class="empty"><i class="ti ti-calendar"></i>Plan some meals first</div>'; return; }

  const seen=[],unique=[];
  planned.forEach(x=>{ if(!seen.includes(String(x.id))){ seen.push(String(x.id)); unique.push(x); } });

  pills.innerHTML = unique.map(x=>{
    const r = recipes.find(r=>String(r._id)===String(x.id));
    return r ? `<span class="grocery-pill on">${r.name} <span style="opacity:0.75">${x.srv} srv</span></span>` : '';
  }).join('');

  const consolidated = {};
  planned.forEach(x=>{
    const r = recipes.find(r=>String(r._id)===String(x.id));
    if(!r) return;
    const scale = x.srv / (r.servings||4);
    (r.ingredients||[]).forEach(ing=>{
      const key = ing.name.toLowerCase().trim();
      if(!consolidated[key]) consolidated[key]={ name:ing.name, qty:0, unit:ing.unit||'' };
      consolidated[key].qty += (ing.quantity||0)*scale;
    });
  });

  const items = Object.values(consolidated);
  if(!items.length){ list.innerHTML='<div class="empty"><i class="ti ti-check"></i>Nothing needed!</div>'; return; }

  list.innerHTML = `<div style="font-size:12px;color:#9a8f82;margin-bottom:8px">${items.length} items</div>` +
    items.map((item,i)=>{
      const id  = 'g'+i;
      const qty = item.qty ? (Math.round(item.qty*10)/10)+(item.unit?' '+item.unit:'') : '';
      return `<div class="grocery-item">
        <input type="checkbox" id="${id}" onchange="document.getElementById('${id}l').classList.toggle('done',this.checked)">
        <label id="${id}l" for="${id}">${item.name}<span class="grocery-qty">${qty}</span></label>
      </div>`;
    }).join('');
}

function printList(){
  const content = document.getElementById('grocery-list').innerHTML;
  const w = window.open('','_blank');
  w.document.write(`<html><head><title>Grocery List</title>
  <style>body{font-family:Georgia,serif;max-width:500px;margin:2rem auto;color:#2a2218}
  h1{font-size:22px;margin-bottom:1rem}
  .grocery-item{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f0ece4;font-size:14px}
  .grocery-qty{color:#9a8f82;font-size:12px}input{margin-right:8px}
  @media print{input{display:none}}</style></head>
  <body><h1>Grocery List — Tia's Cookbook</h1>${content}</body></html>`);
  w.document.close(); w.print();
}

// ── Library ───────────────────────────────────────────────────────────────
function renderLibrary(){
  const grid = document.getElementById('recipe-grid');
  document.getElementById('recipe-count').textContent = recipes.length+' recipe'+(recipes.length===1?'':'s');
  const search = document.getElementById('lib-search').value.toLowerCase();
  const cat    = document.getElementById('lib-cat').value;
  const sort   = document.getElementById('lib-sort').value;
  let filtered = recipes.filter(r=>{
    const ms = !search||r.name.toLowerCase().includes(search)||(r.tags||[]).some(t=>t.toLowerCase().includes(search));
    const mc = !cat||r.category===cat;
    return ms&&mc;
  });
  if(sort==='az')   filtered.sort((a,b)=>a.name.localeCompare(b.name));
  else if(sort==='cat')  filtered.sort((a,b)=>(a.category||'').localeCompare(b.category||''));
  else if(sort==='time') filtered.sort((a,b)=>((a.prep_time_min||0)+(a.cook_time_min||0))-((b.prep_time_min||0)+(b.cook_time_min||0)));
  else filtered.sort((a,b)=>(b._added||0)-(a._added||0));
  if(!filtered.length){
    grid.innerHTML=`<div class="empty" style="grid-column:1/-1"><i class="ti ti-salad"></i>${recipes.length?'No matches':'No recipes yet'}<p>${recipes.length?'Try a different filter':'Go to Import to add recipes'}</p></div>`;
    return;
  }
  grid.innerHTML = filtered.map(r=>{
    const total = (r.prep_time_min||0)+(r.cook_time_min||0);
    return `<div class="recipe-card" onclick="openRecipe('${r._id}')">
      <div class="recipe-thumb">
        ${r._thumb?`<img src="${r._thumb}" alt="${r.name}">`:`<i class="ti ti-bowl-spoon"></i>`}
        ${total?`<div class="recipe-thumb-overlay"><i class="ti ti-clock" style="font-size:10px"></i>${total}m</div>`:''}
        <div class="add-photo-overlay" onclick="event.stopPropagation();triggerPhotoUpload('${r._id}')">
          <i class="ti ti-camera"></i>
          <span>${r._thumb?'Change photo':'Add photo'}</span>
        </div>
      </div>
      <div class="recipe-card-body">
        <span class="cat-badge ${catClass(r.category)}">${r.category||'Other'}</span>
        <div class="recipe-card-name">${r.name}</div>
        <div class="recipe-card-meta">${r.servings||4} servings${r.notes?' · 📝':''}</div>
      </div>
    </div>`;
  }).join('');
}

function filterLibrary(){ renderLibrary(); }

function triggerPhotoUpload(id){
  const inp = document.createElement('input');
  inp.type  = 'file'; inp.accept = 'image/*';
  inp.onchange = e=>{
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      const r = recipes.find(x=>String(x._id)===String(id));
      if(r){ r._thumb = ev.target.result; save(); renderLibrary(); }
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

// ── Recipe Modal ──────────────────────────────────────────────────────────
function openRecipe(id){
  currentRecipe = recipes.find(r=>String(r._id)===String(id));
  if(!currentRecipe) return;
  currentScale = 1; renderModal();
  document.getElementById('recipe-modal').classList.add('open');
}

function renderModal(){
  const r=currentRecipe, s=currentScale;
  const total = (r.prep_time_min||0)+(r.cook_time_min||0);
  const ings  = (r.ingredients||[]).map(ing=>{
    const qty = ing.quantity ? Math.round(ing.quantity*s*10)/10+(ing.unit?' '+ing.unit:'') : '';
    return `<li class="ing-item"><span>${ing.name}${ing.notes?` <span style="font-size:11px;color:#9a8f82">(${ing.notes})</span>`:''}</span><span class="ing-qty">${qty}</span></li>`;
  }).join('');
  const steps = (r.steps||[]).map((step,i)=>`<li class="step-item"><div class="step-num">${i+1}</div><div>${step}</div></li>`).join('');
  document.getElementById('modal-content').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px">
      <div class="modal-title">${r.name}</div>
      <button class="icon-btn" onclick="closeModalDirect()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-hero">
      ${r._thumb?`<img src="${r._thumb}" alt="${r.name}">`:`<i class="ti ti-bowl-spoon modal-hero-icon"></i>`}
      <div class="modal-hero-overlay"><i class="ti ti-camera"></i><span>${r._thumb?'Change photo':'Add photo'}</span></div>
      <input type="file" accept="image/*" onchange="heroPhotoChange(event)">
    </div>
    <div class="modal-meta">
      ${total?`<span><i class="ti ti-clock"></i>${total} min</span>`:''}
      <span><i class="ti ti-users"></i>${Math.round((r.servings||4)*s)} servings</span>
      ${r.calories?`<span><i class="ti ti-flame"></i>${Math.round(r.calories*s)} kcal</span>`:''}
      <span class="cat-badge ${catClass(r.category)}" style="margin:0">${r.category||'Other'}</span>
    </div>
    <div class="scale-bar">
      <span style="font-size:12px;color:#9a8f82;margin-right:4px">Scale:</span>
      ${[1,2,3,4].map(n=>`<button class="scale-btn${s===n?' active':''}" onclick="setScale(${n})">${n}×</button>`).join('')}
    </div>
    ${r.calories?`<div class="macro-row">
      <div class="macro-box"><div class="macro-val">${Math.round((r.calories||0)*s)}</div><div class="macro-label">Calories</div></div>
      <div class="macro-box"><div class="macro-val">${Math.round((r.protein_g||0)*s)}g</div><div class="macro-label">Protein</div></div>
      <div class="macro-box"><div class="macro-val">${Math.round((r.carbs_g||0)*s)}g</div><div class="macro-label">Carbs</div></div>
      <div class="macro-box"><div class="macro-val">${Math.round((r.fat_g||0)*s)}g</div><div class="macro-label">Fat</div></div>
    </div>`:''}
    ${ings?`<div class="modal-section"><div class="modal-section-label">Ingredients</div><ul class="ing-list">${ings}</ul></div>`:''}
    ${steps?`<div class="modal-section"><div class="modal-section-label">Instructions</div><ol class="step-list">${steps}</ol></div>`:''}
    <div class="modal-section">
      <div class="modal-section-label">My notes</div>
      <textarea class="notes-area" id="notes-input" placeholder="Add your notes — substitutions, tips, what the kids loved..." oninput="notesChanged()">${r.notes||''}</textarea>
      <div class="notes-saved" id="notes-saved"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap">
      <button class="btn btn-accent" onclick="addToPlan('${r._id}')"><i class="ti ti-calendar-plus"></i> Add to plan</button>
      <button class="btn" onclick="deleteRecipe('${r._id}')"><i class="ti ti-trash"></i> Delete</button>
    </div>`;
}

function heroPhotoChange(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    currentRecipe._thumb = ev.target.result; save();
    const hero = document.getElementById('modal-content').querySelector('.modal-hero');
    let img = hero.querySelector('img');
    if(img){ img.src=ev.target.result; }
    else{
      const icon = hero.querySelector('.modal-hero-icon'); if(icon) icon.remove();
      img=document.createElement('img'); img.src=ev.target.result; img.alt=currentRecipe.name;
      hero.insertBefore(img,hero.firstChild);
    }
    renderLibrary();
  };
  reader.readAsDataURL(file);
}

function notesChanged(){
  clearTimeout(notesSaveTimer);
  notesSaveTimer = setTimeout(()=>{
    const val = document.getElementById('notes-input')?.value;
    if(val===undefined) return;
    currentRecipe.notes = val; save();
    const el = document.getElementById('notes-saved');
    if(el){ el.textContent='✓ Saved'; el.style.opacity='1'; setTimeout(()=>{ if(el) el.style.opacity='0'; },1500); }
    updateNotesInSheets(currentRecipe);
  }, 800);
}

function setScale(n){ currentScale=n; renderModal(); }

function addToPlan(id){
  const empty = plan.meals.findIndex(m=>!m);
  if(empty>=0){ plan.meals[empty]=id; plan.servings[empty]=null; save(); alert('Added to '+DAY_FULL[empty]+'!'); closeModalDirect(); }
  else { closeModalDirect(); openPicker(0); }
}

function deleteRecipe(id){
  if(!confirm('Delete this recipe?')) return;
  recipes    = recipes.filter(r=>String(r._id)!==String(id));
  plan.meals = plan.meals.map(m=>String(m)===String(id)?null:m);
  save(); closeModalDirect(); renderLibrary(); renderPlanner();
  if(isTokenValid()) syncAll();
}

function closeModal(e){ if(e.target===document.getElementById('recipe-modal')) closeModalDirect(); }
function closeModalDirect(){ document.getElementById('recipe-modal').classList.remove('open'); }

// ── Manual add ────────────────────────────────────────────────────────────
function manualPhoto(e){
  const file = e.target.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev=>{
    manualPhotoData = ev.target.result;
    document.getElementById('m-photo-preview').innerHTML =
      `<img src="${ev.target.result}" style="width:60px;height:60px;object-fit:cover;border-radius:6px">
       <span style="font-size:12px;color:#9a8f82">Photo added ✓</span>`;
  };
  reader.readAsDataURL(file);
}

function addManual(){
  const name = document.getElementById('m-name').value.trim();
  if(!name){ alert('Please enter a recipe name.'); return; }
  const ingsRaw = document.getElementById('m-ings').value.trim().split('\n').filter(Boolean);
  const ingredients = ingsRaw.map(line=>{
    const parts   = line.trim().split(' ');
    const qty     = parseFloat(parts[0]);
    const hasQty  = !isNaN(qty);
    const units   = ['cup','cups','tbsp','tsp','oz','lb','g','kg','ml','l','pinch','bunch','clove','cloves','can','slice','slices','piece','pieces'];
    let unit='', nameStart=hasQty?1:0;
    if(hasQty&&parts[1]&&units.includes(parts[1].toLowerCase())){ unit=parts[1]; nameStart=2; }
    return{ name:parts.slice(nameStart).join(' ')||line, quantity:hasQty?qty:0, unit, notes:'' };
  });
  const steps = document.getElementById('m-steps').value.trim().split('\n').filter(Boolean);
  const recipe = {
    _id:          Date.now()+Math.random(),
    name,
    category:     document.getElementById('m-cat').value,
    servings:     parseInt(document.getElementById('m-servings').value)||4,
    prep_time_min:parseInt(document.getElementById('m-prep').value)||0,
    cook_time_min:parseInt(document.getElementById('m-cook').value)||0,
    calories:     parseInt(document.getElementById('m-cal').value)||0,
    protein_g:    parseInt(document.getElementById('m-protein').value)||0,
    carbs_g:0, fat_g:0, ingredients, steps, tags:[], notes:'',
    _thumb:  manualPhotoData||null,
    _added:  Date.now()
  };
  recipes.push(recipe); save();
  pushRecipeToSheets(recipe);
  manualPhotoData = null;
  document.getElementById('m-photo-preview').innerHTML = `<i class="ti ti-camera"></i> Add a photo`;
  const msg = document.getElementById('manual-msg');
  msg.textContent = '✓ '+name+' added!';
  setTimeout(()=>{ msg.textContent=''; }, 3000);
  ['m-name','m-ings','m-steps','m-cal','m-protein'].forEach(id=>{ document.getElementById(id).value=''; });
  renderLibrary();
}

// ── Upload / Extract ──────────────────────────────────────────────────────
function dzOver(e){ e.preventDefault(); document.getElementById('drop-zone').classList.add('over'); }
function dzLeave(){ document.getElementById('drop-zone').classList.remove('over'); }
function dzDrop(e){ e.preventDefault(); document.getElementById('drop-zone').classList.remove('over'); addToQueue(Array.from(e.dataTransfer.files)); }
function filesChosen(e){ addToQueue(Array.from(e.target.files)); e.target.value=''; }

function addToQueue(files){
  files.filter(f=>f.type.match(/^(image\/(jpeg|png|webp|gif|heic)|application\/pdf)$/)||f.name.match(/\.(pdf|jpg|jpeg|png|webp|heic|gif)$/i))
    .forEach(f=>{
      if(!queue.find(q=>q.file.name===f.name&&q.file.size===f.size))
        queue.push({ file:f, status:'waiting', id:Date.now()+Math.random(), objUrl:f.type.startsWith('image/')?URL.createObjectURL(f):null });
    });
  renderQueue();
}

function renderQueue(){
  const area = document.getElementById('queue-area');
  const list = document.getElementById('queue-list');
  if(!queue.length){ area.style.display='none'; return; }
  area.style.display = 'block';
  const done = queue.filter(q=>q.status==='done').length;
  document.getElementById('q-count').textContent = queue.length+' file(s) · '+done+' extracted';
  document.getElementById('prog').style.width = (done/queue.length*100)+'%';
  list.innerHTML = queue.map(item=>{
    const statusText = { waiting:'Ready',processing:'Extracting...',done:item.recipeName||'Done',error:item.error||'Failed' }[item.status];
    return `<div class="queue-item ${item.status}">
      <div class="queue-thumb">${item.objUrl?`<img src="${item.objUrl}" alt="">`:item.status==='done'?`<i class="ti ti-check"></i>`:`<i class="ti ti-file"></i>`}</div>
      <div class="queue-info"><div class="queue-name">${item.file.name}</div><div class="queue-status ${item.status}">${statusText}</div></div>
      ${item.status==='processing'?'<div class="spinner"></div>':''}
    </div>`;
  }).join('');
}

function clearDone(){ queue=queue.filter(q=>q.status!=='done'); renderQueue(); }

async function extractAll(){
  const key = document.getElementById('api-key').value.trim();
  if(!key){ alert('Please enter your Anthropic API key first.'); return; }
  apiKey=key; localStorage.setItem('tc_apikey',apiKey);
  if(extracting) return;
  const pending = queue.filter(q=>q.status==='waiting'||q.status==='error');
  if(!pending.length){ alert('No pending files.'); return; }
  extracting = true;
  const btn = document.getElementById('extract-btn');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner" style="border-top-color:#fff"></div> Extracting...';
  for(const item of pending){
    item.status='processing'; renderQueue();
    try{
      const {base64,mediaType} = await toBase64(item.file);
      const recipe = await extract(item.file.name, base64, mediaType);
      if(item.objUrl) recipe._thumb = item.objUrl;
      recipe.notes = '';
      recipes.push(recipe); save();
      pushRecipeToSheets(recipe);
      item.status='done'; item.recipeName=recipe.name;
      log('✓ '+recipe.name, 'ok');
    }catch(e){
      item.status='error'; item.error=e.message.slice(0,60);
      log('✗ '+item.file.name+': '+e.message, 'err');
    }
    renderQueue();
  }
  extracting=false;
  btn.disabled=false;
  btn.innerHTML='<i class="ti ti-sparkles"></i> Extract all';
  log('Done! '+recipes.length+' total recipes.', 'ok');
  setTimeout(()=>show('library'), 1200);
}

async function toBase64(file){
  let mediaType = file.type||'image/jpeg';
  if(mediaType.includes('heic')||mediaType.includes('tiff')) mediaType='image/jpeg';
  if(!['image/jpeg','image/png','image/webp','image/gif','application/pdf'].includes(mediaType)) mediaType='image/jpeg';
  const base64 = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file); });
  return{base64,mediaType};
}

async function extract(filename, base64, mediaType){
  const isPdf  = mediaType==='application/pdf';
  const block  = isPdf
    ? {type:'document',source:{type:'base64',media_type:'application/pdf',data:base64}}
    : {type:'image',   source:{type:'base64',media_type:mediaType,data:base64}};
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{ 'Content-Type':'application/json', 'x-api-key':apiKey, 'anthropic-version':'2023-06-01', 'anthropic-dangerous-direct-browser-access':'true' },
    body: JSON.stringify({
      model:'claude-haiku-4-5-20251001',
      max_tokens:2000,
      system:`You are a recipe data extractor. Extract ALL recipe info from this file.
IMPORTANT: Use the actual recipe name from the content, NOT the filename.
Return ONLY valid JSON, no markdown:
{"name":"Recipe Name From Content","category":"Breakfast|Lunch|Dinner|Dessert|Snack|Appetizer|Side","servings":4,"prep_time_min":10,"cook_time_min":20,"calories":0,"protein_g":0,"carbs_g":0,"fat_g":0,"ingredients":[{"name":"","quantity":1,"unit":"","notes":""}],"steps":[""],"tags":[]}
Estimate nutrition if not provided. Return ONLY the JSON.`,
      messages:[{ role:'user', content:[block,{type:'text',text:'Extract the recipe. File is named "'+filename+'" but use the actual recipe name from the content.'}] }]
    })
  });
  if(!res.ok){ const e=await res.json().catch(()=>({})); throw new Error(e.error?.message||'API error '+res.status); }
  const data   = await res.json();
  const text   = data.content.map(b=>b.text||'').join('').replace(/```json|```/g,'').trim();
  const recipe = JSON.parse(text);
  recipe._id   = Date.now()+Math.random();
  recipe._added= Date.now();
  return recipe;
}

function log(msg,type=''){
  const el = document.getElementById('log-box');
  el.classList.add('visible');
  const line = document.createElement('div');
  line.className = 'log-line '+type;
  line.textContent = '['+new Date().toLocaleTimeString()+'] '+msg;
  el.appendChild(line);
  el.scrollTop = el.scrollHeight;
}

renderPlanner();
renderLibrary();
</script>
